name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check brt_platform tests

      - name: Syntax check
        run: find brt_platform -name "*.py" -exec python -m py_compile {} \;

      - name: Scope discipline
        run: bash scripts/check-scope-discipline.sh

      - name: Unit tests
        run: pytest tests/ -v --timeout=60

  lint-actions:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: actionlint
        uses: raven-actions/actionlint@v2
